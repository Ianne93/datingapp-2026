<header class="p-3 w-full fixed top-0 z-50 bg-linear-to-r from-primary to-black">
  <div class="flex items-center px-10 mx-auto gap-6">
    <a routerLink="/" class="flex items-center gap-3 text-white border-r-white border-r-2 pr-6">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-7">
        <path
          d="M4.5 6.375a4.125 4.125 0 1 1 8.25 0 4.125 4.125 0 0 1-8.25 0ZM14.25 8.625a3.375 3.375 0 1 1 6.75 0 3.375 3.375 0 0 1-6.75 0ZM1.5 19.125a7.125 7.125 0 0 1 14.25 0v.003l-.001.119a.75.75 0 0 1-.363.63 13.067 13.067 0 0 1-6.761 1.873c-2.472 0-4.786-.684-6.76-1.873a.75.75 0 0 1-.364-.63l-.001-.122ZM17.25 19.128l-.001.144a2.25 2.25 0 0 1-.233.96 10.088 10.088 0 0 0 5.06-1.01.75.75 0 0 0 .42-.643 4.875 4.875 0 0 0-6.957-4.611 8.586 8.586 0 0 1 1.71 5.157v.003Z" />
      </svg>
      <h3 class="text-2xl font-semibold text-white uppercase">Dating App</h3>
    </a>
    <nav class="flex gap-3 uppercase text-sm font-medium text-white/80">
      @if(accountService.currentUser()) {
      <a routerLink="members" routerLinkActive="text-accent"
        class="hover:text-white transition-colors cursor-pointer">Matches</a>
      <a routerLink="lists" routerLinkActive="text-accent"
        class="hover:text-white transition-colors cursor-pointer">List</a>
      <a routerLink="messages" routerLinkActive="text-accent"
        class="hover:text-white transition-colors cursor-pointer">Messages</a>
      }
    </nav>
    <div class="flex items-center ml-auto gap-3">
      @if (accountService.currentUser(); as user) {
      <div class="dropdown dropdown-end">
        <div tabindex="0" role="button"
          class="flex items-center text-white gap-3 cursor-pointer hover:opacity-80 transition-opacity">
          <img src="/user.png" alt="user avatar" class="w-8 h-8 rounded-full object-cover ring-2 ring-white/30" />
          <span class="font-medium">{{ user.displayName }}</span>
        </div>
        <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box z-10 w-52 p-2 shadow-lg mt-2">
          <li><a>Edit Profile</a></li>
          <li><a (click)="logout()">Logout</a></li>
        </ul>
      </div>
      } @else {
      <form #loginForm="ngForm" (ngSubmit)="login()" class="flex items-center gap-4">
        <input type="text" placeholder="Email" class="input input-bordered input-sm w-48" [(ngModel)]="creds.email"
          name="email" />

        <div class="relative w-48">
          <input [type]="showPassword ? 'text' : 'password'" placeholder="Password" name="password"
            [(ngModel)]="creds.password" class="input input-bordered input-sm w-full pr-10" />
          <button type="button" (click)="togglePassword()"
            class="btn btn-ghost btn-xs absolute right-2 top-1/2 -translate-y-1/2">
            <i [class]="showPassword ? 'fa fa-eye-slash' : 'fa fa-eye'" aria-hidden="true"></i>
          </button>
        </div>
        <button type="submit" class="btn btn-sm btn-primary">Login</button>
      </form>
      }
    </div>
  </div>
</header>
